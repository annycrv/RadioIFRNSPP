{% load crispy_forms_filters %}

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form|crispy }}

    <div class="d-flex justify-content-end gap-2 mt-3">

        <a href="{% url url_cancelar %}"
           class="btn btn-secondary">
            Cancelar
        </a>

        <button type="submit"
                class="btn btn-primary">
            Salvar
        </button>

    </div>
</form>
