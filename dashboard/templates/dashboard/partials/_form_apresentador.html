{% load static crispy_forms_filters %}
<form method="POST" enctype="multipart/form-data" class="form-modal" action="{{ url_salvar }}">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn-salvar salvar px-4">Salvar</button>
        <button type="button" class="btn btn-outline-secondary px-4">
            Cancelar
        </button>
    </div>
</form>
