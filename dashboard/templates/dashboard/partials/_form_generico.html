{% load static crispy_forms_filters %}
<form method="POST" enctype="multipart/form-data" class="form-modal" action="{{ url_salvar }}">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary"
                data-bs-dismiss="modal">
            Cancelar
        </button>

        <button type="button"
                class="btn btn-primary btn-salvar">
            Salvar
        </button>
    </div>
</form>
