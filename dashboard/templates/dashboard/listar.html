{% extends "dashboard/base.html" %}

{% block title %}
    {{ titulo_pagina }}
{% endblock title %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <p class="text-muted">
            {{ subtitulo_pagina }}
        </p>

    </div>

    {% if url_novo %}

        <a
            href="{% url url_novo %}"
            class="px-4 py-2 btn-novo"
            data-titulo="{{ titulo_pagina }}"
        >

            <i class="bi bi-plus-lg me-2"></i>

            {{ texto_botao_novo }}

        </a>

    {% endif %}

</div>

<div id="form-container"></div>

<div
    id="container-lista"
    data-url="{{ url_ajax }}"
>

    {% include "dashboard/partials/_conteudo_lista.html" %}

</div>

{% endblock content %}
